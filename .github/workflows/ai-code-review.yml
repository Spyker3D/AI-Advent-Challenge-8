name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MCP_PROJECT_ROOT: ${{ github.workspace }}
      MCP_DISABLE_WEATHER: "true"
      DEVELOPER_ASSISTANT_MCP_URL: http://localhost:3000/mcp
      REVIEW_FILE: build/ai-review.md
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP dependencies
        run: npm ci --prefix mcp-server

      - name: Start MCP server
        shell: bash
        run: |
          set -euo pipefail

          node mcp-server/server.js > build-mcp.log 2>&1 &
          MCP_PID=$!

          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
              http://localhost:3000/mcp > /dev/null; then
              echo "MCP server is ready"
              exit 0
            fi

            if ! kill -0 "$MCP_PID" 2>/dev/null; then
              echo "MCP server stopped unexpectedly"
              cat build-mcp.log
              exit 1
            fi

            sleep 1
          done

          echo "MCP server did not start in time"
          cat build-mcp.log
          exit 1

      - name: Install and start Ollama
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://ollama.com/install.sh -o /tmp/install-ollama.sh
          sudo sh /tmp/install-ollama.sh

          echo "Ollama location:"
          command -v ollama
          ollama --version

          ollama serve > build-ollama.log 2>&1 &
          OLLAMA_PID=$!

          for attempt in {1..60}; do
            if curl --fail --silent \
              http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama server is ready"
              break
            fi

            if ! kill -0 "$OLLAMA_PID" 2>/dev/null; then
              echo "Ollama process stopped unexpectedly"
              cat build-ollama.log
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Ollama did not start in time"
              cat build-ollama.log
              exit 1
            fi

            sleep 1
          done

          ollama pull nomic-embed-text:latest

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Generate AI review
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build

          ./gradlew \
            --console=plain \
            :developer-assistant:run \
            --args="review-pr \
              --project-root=. \
              --base-ref=${{ github.event.pull_request.base.sha }} \
              --head-ref=${{ github.event.pull_request.head.sha }} \
              --output=build/ai-review.md"

          test -f build/ai-review.md

      - name: Create or update PR comment
        run: node scripts/upsert-ai-review.js

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-review-${{ github.event.pull_request.number }}
          path: build/ai-review.md
          if-no-files-found: warn